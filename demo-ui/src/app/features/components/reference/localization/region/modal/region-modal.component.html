<div class="modal-form" >
<form [formGroup]="form" (ngSubmit)="saveOrUpdate()">
<mat-dialog-content class="text-grey-darker">
<div>
<button mat-icon-button mat-dialog-close disableRipple>
<mat-icon class="text-grey" svgIcon="close"></mat-icon>
</button>
</div>
<section>
<p>
<mat-form-field appearance="outline" floatLabel="always">
<mat-label>Country</mat-label>
<mat-select placeholder="Country" formControlName="countryCode" >
<mat-option [value]="null"></mat-option>
@for (option of countryCodeOptions; track option.key) {
  <mat-option [value]="option.key">{{option.label}}</mat-option>
}
</mat-select>
</mat-form-field>
</p>

<p>
<mat-form-field appearance="outline" floatLabel="always">
<mat-label>Code</mat-label>
<input matInput placeholder="Code" formControlName="code"/>
</mat-form-field>
</p>

<p>
<mat-form-field appearance="outline" floatLabel="always">
<mat-label>Label</mat-label>
<input matInput placeholder="Label" formControlName="label"/>
</mat-form-field>
</p>

</section>
</mat-dialog-content>
<mat-dialog-actions>
@if (view.id == null) {
  <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Save</button>
}
@if (view.id != null && view.canUpdate) {
  <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Update</button>
}
</mat-dialog-actions>
</form>
<!-- Specific Code Start -->
<!-- Specific Code End -->
</div>
